name: Cloudflare Maintenance

on:
  workflow_dispatch:

jobs:
  inspect-pages-project:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect Pages project
        env:
          CLOUDFLARE_ACCOUNT_ID: 9eec6c7e2276e43a418283b32d6ca618
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          PROJECT_NAME: keylun-notes
        run: |
          set -euo pipefail
          curl -fsS \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${PROJECT_NAME}" \
            --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            --header "Content-Type: application/json" \
            | jq '{success, errors, result: {name: .result.name, production_branch: .result.production_branch, source: .result.source, build_config: .result.build_config, deployment_configs: .result.deployment_configs}}'

      - name: Inspect Pages deployments
        env:
          CLOUDFLARE_ACCOUNT_ID: 9eec6c7e2276e43a418283b32d6ca618
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          PROJECT_NAME: keylun-notes
        run: |
          set -euo pipefail
          curl -fsS \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${PROJECT_NAME}/deployments" \
            --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            --header "Content-Type: application/json" \
            | jq '{success, errors, deployments: [.result[:10][] | {id, short_id, project_name, environment, latest_stage: .latest_stage, deployment_trigger, url, aliases, created_on}]}'
