media:
  - name: site_images
    label: 站点图片
    input: public/assets/images
    output: /assets/images
    categories: [image]
    extensions: [jpg, jpeg, png, webp, gif, svg]
  - name: post_images
    label: 文章图片
    input: src/content/posts
    output: /src/content/posts
    categories: [image]
    extensions: [jpg, jpeg, png, webp, gif, svg]
  - name: site_audio
    label: 站点音频
    input: public/assets/music
    output: /assets/music
    extensions: [mp3, m4a, wav, ogg, flac, lrc]
  - name: markdown_imports
    label: Markdown 导入
    input: src/imports/markdown
    output: /src/imports/markdown
    extensions: [md, markdown, zip]
    actions:
      - name: import-markdown-media
        label: 导入为文章
        workflow: import-markdown-post.yml
        ref: current
        confirm:
          title: 导入 Markdown？
          message: 可上传单个 Markdown，或上传包含 Markdown 与图片文件夹的 zip 包；导入时会自动匹配相对图片并下载远程图片。
          button: 开始导入
        fields:
          - name: title
            label: 标题（可选，留空则读取 Markdown）
            type: text
            required: false
          - name: slug
            label: URL 名称（可选）
            type: text
            required: false
          - name: category
            label: 分类（可选）
            type: text
            required: false
          - name: tags
            label: 标签（逗号分隔，可选）
            type: text
            required: false
          - name: download_images
            label: 下载远程图片
            type: checkbox
            default: true
          - name: draft
            label: 作为草稿
            type: checkbox
            default: false
          - name: delete_source
            label: 导入成功后删除临时 Markdown
            type: checkbox
            default: true

actions:
  - name: import-markdown-post
    label: 导入 Markdown 文章
    workflow: import-markdown-post.yml
    ref: current
    confirm:
      title: 导入 Markdown 文章？
      message: 可以粘贴 Markdown 原文，或填写 Markdown 原始 URL。远程图片会被下载到文章资源目录；本地图片请用 Markdown 导入媒体库上传 zip 包。
      button: 开始导入
    fields:
      - name: markdown_url
        label: Markdown 原始 URL（可选）
        type: text
        required: false
      - name: markdown_text
        label: Markdown 原文（可选）
        type: textarea
        required: false
      - name: title
        label: 标题（可选，留空则读取 Markdown）
        type: text
        required: false
      - name: slug
        label: URL 名称（可选）
        type: text
        required: false
      - name: category
        label: 分类（可选）
        type: text
        required: false
      - name: tags
        label: 标签（逗号分隔，可选）
        type: text
        required: false
      - name: download_images
        label: 下载远程图片
        type: checkbox
        default: true
      - name: draft
        label: 作为草稿
        type: checkbox
        default: false

content:
  - name: writing
    label: 写作
    type: group
    items:
      - name: posts
        label: 文章
        type: collection
        path: src/content/posts
        format: yaml-frontmatter
        subfolders: true
        filename:
          template: "{year}-{month}-{day}-{primary}.md"
          field: create
        view:
          primary: title
          fields: [published, category, draft]
          sort: published
          order: desc
        fields:
          - name: title
            label: 标题
            type: string
          - name: published
            label: 发布日期
            type: date
          - name: updated
            label: 更新日期
            type: date
            required: false
          - name: description
            label: 摘要
            type: rich-text
            required: false
          - name: cover
            label: 封面图
            type: image
            options:
              media: site_images
            required: false
          - name: coverInContent
            label: 正文显示封面
            type: boolean
            required: false
          - name: category
            label: 分类
            type: string
            required: false
          - name: tags
            label: 标签
            type: string
            list: true
            required: false
          - name: pinned
            label: 置顶
            type: boolean
            required: false
          - name: draft
            label: 草稿
            type: boolean
            required: false
          - name: body
            label: 正文
            type: rich-text

      - name: about_page
        label: 关于页面
        type: file
        path: src/content/about.md
        format: yaml-frontmatter
        fields:
          - name: title
            label: 标题
            type: string
            required: false
          - name: description
            label: 描述
            type: text
            required: false
          - name: body
            label: 正文
            type: rich-text

      - name: friends_page
        label: 友链页面说明
        type: file
        path: src/content/friends.md
        format: yaml-frontmatter
        fields:
          - name: title
            label: 标题
            type: string
            required: false
          - name: description
            label: 描述
            type: text
            required: false
          - name: body
            label: 正文
            type: rich-text

  - name: profile_group
    label: 个人资料
    type: group
    items:
      - name: profile
        label: 侧边栏资料
        type: file
        path: src/content/profile.json
        format: json
        fields:
          - name: name
            label: 名称
            type: string
          - name: avatar
            label: 头像
            type: image
            options:
              media: site_images
            required: false
          - name: bio
            label: 简介
            type: text
            required: false
          - name: links
            label: 链接
            type: object
            list: true
            required: false
            fields:
              - name: name
                label: 名称
                type: string
              - name: icon
                label: 图标
                type: string
              - name: url
                label: URL
                type: string

      - name: music_player
        label: 音乐播放器
        type: file
        path: src/content/music-player.json
        format: json
        fields:
          - name: enable
            label: 启用播放器
            type: boolean
          - name: mode
            label: 默认音源模式
            type: select
            options:
              values: [local, meting]
          - name: autoplay
            label: 自动播放
            type: boolean
            required: false
          - name: local
            label: 本地音频
            type: object
            fields:
              - name: playlist
                label: 播放列表
                type: object
                list:
                  collapsible:
                    collapsed: true
                    summary: "{title} - {artist}"
                fields:
                  - name: id
                    label: 序号
                    type: number
                  - name: title
                    label: 标题
                    type: string
                  - name: artist
                    label: 作者
                    type: string
                  - name: cover
                    label: 封面链接
                    type: string
                    required: false
                  - name: url
                    label: 音频文件
                    type: file
                    options:
                      media: site_audio
                    extensions: [mp3, m4a, wav, ogg, flac]
                    required: false
                  - name: externalUrl
                    label: 外部音频链接或手填路径
                    type: string
                    required: false
                  - name: lrc
                    label: 歌词文件
                    type: file
                    options:
                      media: site_audio
                    extensions: [lrc]
                    required: false
                  - name: duration
                    label: 时长（秒）
                    type: number
                    required: false
          - name: meting
            label: Meting 云端歌单
            type: object
            fields:
              - name: meting_api
                label: API 地址
                type: string
              - name: server
                label: 音乐平台
                type: select
                options:
                  values: [netease, tencent, kugou, baidu, kuwo]
              - name: type
                label: 资源类型
                type: select
                options:
                  values: [playlist, album, artist, song, search]
              - name: id
                label: 资源 ID
                type: string

  - name: showcase
    label: 展示
    type: group
    items:
      - name: friends
        label: 友链
        type: collection
        path: src/content/friends
        format: json
        filename:
          template: "{primary}.json"
          field: create
        view:
          primary: title
          fields: [siteurl]
          sort: title
        fields:
          - name: title
            label: 站点名称
            type: string
          - name: imgurl
            label: 头像链接
            type: string
          - name: desc
            label: 描述
            type: text
          - name: siteurl
            label: 站点链接
            type: string
          - name: tags
            label: 标签
            type: string
            list: true
            required: false

      - name: projects
        label: 项目
        type: collection
        path: src/content/projects
        format: json
        subfolders: true
        filename:
          template: "{primary}.json"
          field: create
        view:
          primary: title
          fields: [category, status, featured]
          sort: startDate
          order: desc
        fields:
          - name: title
            label: 项目名称
            type: string
          - name: description
            label: 项目描述
            type: text
          - name: image
            label: 项目图片
            type: image
            options:
              media: site_images
            required: false
          - name: category
            label: 分类
            type: select
            options:
              values: [website, software, ai, library, game, other]
          - name: techStack
            label: 技术栈
            type: string
            list: true
            required: false
          - name: status
            label: 状态
            type: select
            options:
              values: [completed, in-progress, planned]
          - name: liveDemo
            label: 在线演示
            type: string
            required: false
          - name: sourceCode
            label: 源码链接
            type: string
            required: false
          - name: startDate
            label: 开始日期
            type: date
            required: false
          - name: endDate
            label: 结束日期
            type: date
            required: false
          - name: featured
            label: 首页推荐
            type: boolean
            required: false
          - name: tags
            label: 标签
            type: string
            list: true
            required: false

      - name: skills
        label: 技能
        type: collection
        path: src/content/skills
        format: json
        filename:
          template: "{primary}.json"
          field: create
        view:
          primary: name
          fields: [category, level]
          sort: name
        fields:
          - name: name
            label: 技能名称
            type: string
          - name: category
            label: 分类
            type: string
          - name: level
            label: 熟练度
            type: select
            options:
              values: [beginner, intermediate, advanced, expert]
            required: false
          - name: experience
            label: 经验
            type: string
            required: false
          - name: description
            label: 描述
            type: text
          - name: projects
            label: 相关项目
            type: string
            list: true
            required: false
          - name: icon
            label: 图标
            type: string
            required: false

      - name: timeline
        label: 时间线
        type: collection
        path: src/content/timeline
        format: json
        filename:
          template: "{primary}.json"
          field: create
        view:
          primary: title
          fields: [type, startDate, featured]
          sort: startDate
          order: desc
        fields:
          - name: title
            label: 标题
            type: string
          - name: type
            label: 类型
            type: select
            options:
              values: [education, work, project, achievement]
          - name: startDate
            label: 开始日期
            type: string
          - name: endDate
            label: 结束日期
            type: string
            required: false
          - name: location
            label: 地点
            type: string
            required: false
          - name: description
            label: 描述
            type: text
          - name: details
            label: 详情
            type: string
            list: true
            required: false
          - name: featured
            label: 推荐展示
            type: boolean
            required: false

settings:
  hide: false
  content:
    merge: true
